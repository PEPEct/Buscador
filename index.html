<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Buscador de códigos y ubicaciones. Publicable en GitHub Pages.">
  <title>Buscador de Códigos</title>
  <style>
    :root {
      --bg: #f7efe2;
      --panel: #ffffff;
      --panel-2: #fff9f1;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e7dcc9;
      --brand: #b9844b;
      --brand-strong: #8f5f2e;
      --ok-bg: #edf9f0;
      --ok-text: #17663a;
      --error-bg: #fff1f2;
      --error-text: #b42318;
      --shadow: 0 10px 30px rgba(26, 26, 26, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #fff7ec 0%, var(--bg) 35%, #f3e7d6 100%);
      min-height: 100vh;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero {
      background: linear-gradient(135deg, #fff8ef, #ffffff);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 70ch;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .card-header h2, .card-header h3 {
      margin: 0;
      font-size: 18px;
    }

    .card-body {
      padding: 20px;
    }

    .search-grid {
      display: grid;
      gap: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #d4c3aa;
      border-radius: 12px;
      outline: none;
      transition: .2s border-color, .2s box-shadow, .2s background;
      background: #fffdfa;
    }

    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(185, 132, 75, 0.15);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .2s ease, background .2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      min-width: 144px;
    }

    .btn-secondary {
      color: var(--text);
      background: #f5eadb;
      min-width: 110px;
    }

    .btn-ghost {
      color: var(--brand-strong);
      background: transparent;
      border: 1px solid var(--line);
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.5;
      border: 1px solid transparent;
    }

    .message.show { display: block; }
    .message.success {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: #b8e3c5;
    }
    .message.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: #fecdd3;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: #fffdfa;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .stat small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .stat strong {
      font-size: 24px;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      background: #f6eadb;
      border: 1px solid #ead7bc;
      color: #6e4b28;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .results-list {
      list-style: none;
      padding: 0;
      margin: 16px 0 0;
      display: grid;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
    }

    .result-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fffdfa;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .code {
      font-weight: 800;
      color: var(--brand-strong);
      word-break: break-word;
    }

    .location {
      font-weight: 700;
      white-space: nowrap;
    }

    .desc {
      margin-top: 8px;
      color: var(--text);
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 20px, 1100px); margin: 12px auto 24px; }
      .hero, .card-body, .card-header { padding: 16px; }
      .input-row { flex-direction: column; }
      .btn-primary, .btn-secondary { width: 100%; min-width: 0; }
      .result-top {
        flex-direction: column;
      }
      .location {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Buscador de Códigos</h1>
      <p>
      </p>
    </section>

    <section class="layout">
      <div class="card">
        <div class="card-header">
          <h2>Búsquedas</h2>
        </div>
        <div class="card-body">
          <div class="summary">
            <div class="stat">
              <small>Registros</small>
              <strong id="totalRegistros">0</strong>
            </div>
            <div class="stat">
              <small>Códigos únicos</small>
              <strong id="totalCodigos">0</strong>
            </div>
            <div class="stat">
              <small>Carros</small>
              <strong id="totalCarros">0</strong>
            </div>
          </div>

          <div class="search-grid">
            <div class="field">
              <label for="codigo">Buscar por código</label>
              <div class="input-row">
                <input type="text" id="codigo" placeholder="Ejemplo: MP50034930008" autocomplete="off">
                <button class="btn-primary" id="btnCodigo">Buscar</button>
              </div>
              <div class="hint">Busca coincidencia exacta. También puedes pulsar Enter.</div>
              <div id="resultadoCodigo" class="message" aria-live="polite"></div>
            </div>

            <div class="field">
              <label for="descripcion">Buscar por descripción</label>
              <div class="input-row">
                <input type="text" id="descripcion" placeholder="Ejemplo: tornillo, wago, panel..." autocomplete="off">
                <button class="btn-primary" id="btnDescripcion">Buscar</button>
              </div>
              <div class="stack">
                <button class="btn-secondary" id="btnLimpiar">Limpiar</button>
                <button class="btn-ghost" id="btnCopiar">Copiar resultados</button>
              </div>
              <div class="hint">La búsqueda encuentra coincidencias parciales en la descripción y en el código.</div>
              <div id="resultadoDescripcion" class="message" aria-live="polite"></div>
            </div>
          </div>

          <ul id="listaResultados" class="results-list"></ul>
          <div id="notaResultados" class="footer-note"></div>
        </div>
      </div>

      <aside class="card">
        <div class="card-header">
          <h3>Carros y ayuda</h3>
        </div>
        <div class="card-body">
          <div class="toolbar">
            <strong>Leyenda de carros</strong>
            <span id="contadorLeyendas" class="muted"></span>
          </div>
          <div id="leyendaCarro" class="chip-list"></div>

          <div class="footer-note">
            <strong> </strong><br>
          </div>

          <div class="footer-note">
            <strong> </strong><br>
            <code> </code>.
          </div>
        </div>
      </aside>
    </section>
  </main>

    function normalizar(texto) {
      return (texto || '')
        .toString()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim();
    }

    function escapeHtml(texto) {
      return (texto || '').toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function mostrarMensaje(target, tipo, html) {
      target.className = `message show ${tipo}`;

    function limpiarMensaje(target) {
      target.className = 'message';
      target.innerHTML = '';

        : Object.keys(leyendasCarros);

      el.leyendaCarro.innerHTML = claves
        .map(codigo => `<span class="chip">${escapeHtml(leyendasCarros[codigo] || codigo)}</span>`)
        .join('');

      el.contadorLeyendas.textContent = `${claves.length} visibles`;
    }

    function inicializarResumen() {
      el.totalRegistros.textContent = baseDeDatos.length;
      el.totalCodigos.textContent = new Set(baseDeDatos.map(item => item.codigo)).size;
      el.totalCarros.textContent = new Set(
        baseDeDatos
          .map(item => (item.ubicacion || '').split('-')[0])
          .filter(Boolean)
      ).size;
      renderLeyendas();
    }

    function actualizarURL(params) {
      const url = new URL(window.location.href);
      url.search = '';
      Object.entries(params).forEach(([key, value]) => {
        if (value) url.searchParams.set(key, value);
      });
      window.history.replaceState({}, '', url.toString());
    }

    function renderLista(resultados) {
      if (!resultados.length) {
        el.listaResultados.innerHTML = '';
        el.notaResultados.textContent = '';
        textoCopiable = '';
        return;
      }

      el.listaResultados.innerHTML = resultados.map(item => {
        const carro = (item.ubicacion || '').split('-')[0];
        const leyenda = leyendasCarros[carro] || 'Sin leyenda';
        return `
          <li class="result-item">
            <div class="result-top">
              <div class="code">${escapeHtml(item.codigo)}</div>
              <div class="location">${escapeHtml(item.ubicacion)}</div>
            </div>
            <div class="desc">${escapeHtml(item.Descripcion)}</div>
            <div class="hint">${escapeHtml(leyenda)}</div>
          </li>
        `;
      }).join('');

      textoCopiable = resultados.map(item => `${item.codigo} | ${item.Descripcion} | ${item.ubicacion}`).join('\n');
      el.notaResultados.textContent = `${resultados.length} resultado(s) mostrado(s).`;
    }

    function buscarCodigo() {
      const codigo = normalizar(el.codigo.value);
      limpiarMensaje(el.resultadoDescripcion);
      el.listaResultados.innerHTML = '';
      el.notaResultados.textContent = '';
      textoCopiable = '';

      if (!codigo) {
        mostrarMensaje(el.resultadoCodigo, 'error', 'Por favor, introduce un código.');
        renderLeyendas();
        actualizarURL({});
        return;
      }

      const resultados = baseDeDatos.filter(item => normalizar(item.codigo) === codigo);

      if (!resultados.length) {
        mostrarMensaje(el.resultadoCodigo, 'error', 'Código no encontrado.');
        renderLeyendas();
        actualizarURL({ codigo: el.codigo.value.trim() });
        return;
      }

      const ubicaciones = [...new Set(resultados.map(item => item.ubicacion))];
      const descripciones = [...new Set(resultados.map(item => item.Descripcion))];
      const carros = [...new Set(resultados.map(item => (item.ubicacion || '').split('-')[0]))];

      mostrarMensaje(
        el.resultadoCodigo,
        'success',
        `<strong>Ubicaciones:</strong> ${ubicaciones.map(escapeHtml).join(', ')}<br>
         <strong>Descripción:</strong> ${descripciones.map(escapeHtml).join(', ')}`
      );

      renderLeyendas(carros);
      renderLista(resultados);
      actualizarURL({ codigo: el.codigo.value.trim() });
    }

    function buscarDescripcion() {
      const descripcion = normalizar(el.descripcion.value);
      limpiarMensaje(el.resultadoCodigo);

      if (!descripcion) {
        mostrarMensaje(el.resultadoDescripcion, 'error', 'Por favor, introduce una descripción o parte del código.');
        el.listaResultados.innerHTML = '';
        el.notaResultados.textContent = '';
        textoCopiable = '';
        renderLeyendas();
        actualizarURL({});
        return;
      }

      const resultados = baseDeDatos.filter(item => {
        const codigo = normalizar(item.codigo);
        const texto = normalizar(item.Descripcion);
        return texto.includes(descripcion) || codigo.includes(descripcion);
      });

      if (!resultados.length) {
        mostrarMensaje(el.resultadoDescripcion, 'error', 'No se encontraron coincidencias.');
        el.listaResultados.innerHTML = '';
        el.notaResultados.textContent = '';
        textoCopiable = '';
        renderLeyendas();
        actualizarURL({ descripcion: el.descripcion.value.trim() });
        return;
      }

      const carros = [...new Set(resultados.map(item => (item.ubicacion || '').split('-')[0]).filter(Boolean))];
      mostrarMensaje(el.resultadoDescripcion, 'success', `<strong>Coincidencias:</strong> ${resultados.length}`);
      renderLeyendas(carros);
      renderLista(resultados);
      actualizarURL({ descripcion: el.descripcion.value.trim() });
    }

    function limpiarTodo() {
      el.codigo.value = '';
      el.descripcion.value = '';
      limpiarMensaje(el.resultadoCodigo);
      limpiarMensaje(el.resultadoDescripcion);
      el.listaResultados.innerHTML = '';
      el.notaResultados.textContent = '';
      textoCopiable = '';
      renderLeyendas();
      actualizarURL({});
      el.codigo.focus();
    }

    async function copiarResultados() {
      if (!textoCopiable) {
        mostrarMensaje(el.resultadoDescripcion, 'error', 'No hay resultados para copiar todavía.');
        return;
      }

      try {
        await navigator.clipboard.writeText(textoCopiable);
        mostrarMensaje(el.resultadoDescripcion, 'success', 'Resultados copiados al portapapeles.');
      } catch {
        mostrarMensaje(el.resultadoDescripcion, 'error', 'No se pudieron copiar los resultados.');
      }
    }

    function cargarDesdeURL() {
      const params = new URLSearchParams(window.location.search);
      const codigo = params.get('codigo');
      const descripcion = params.get('descripcion');

      if (codigo) {
        el.codigo.value = codigo;
        buscarCodigo();
        return;
      }

      if (descripcion) {
        el.descripcion.value = descripcion;
        buscarDescripcion();
      }
    }

    el.btnCodigo.addEventListener('click', buscarCodigo);
    el.btnDescripcion.addEventListener('click', buscarDescripcion);
    el.btnLimpiar.addEventListener('click', limpiarTodo);
    el.btnCopiar.addEventListener('click', copiarResultados);

    el.codigo.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') buscarCodigo();
    });

    el.descripcion.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') buscarDescripcion();
    });

    inicializarResumen();
    cargarDesdeURL();
  </script>
</body>
</html>
